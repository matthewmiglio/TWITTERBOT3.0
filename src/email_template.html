<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TwitterBot Report</title>
</head>
<body style="margin:0;padding:0;background:#000000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#000000;padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background:#16181c;border:1px solid #2f3336;border-radius:16px;max-width:560px;width:100%;">
          <tr>
            <td style="padding:24px 28px;border-bottom:1px solid #2f3336;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-size:20px;font-weight:800;color:#e7e9ea;letter-spacing:-0.01em;">
                    <span style="color:#1d9bf0;font-weight:900;">𝕏</span>&nbsp;&nbsp;TwitterBot Report
                  </td>
                </tr>
                <tr>
                  <td style="font-size:13px;color:#71767b;padding-top:4px;">{{now}}</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:28px 28px 8px;">
              <div style="font-size:24px;font-weight:800;color:#e7e9ea;letter-spacing:-0.01em;margin-bottom:24px;">
                {{greeting}}, {{name}}
              </div>

              <div style="font-size:11px;font-weight:700;letter-spacing:0.08em;color:#71767b;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid #2f3336;">This session</div>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 20px;">
                <tr>
                  <td style="padding:14px 0;font-size:15px;color:#e7e9ea;">Users followed</td>
                  <td align="right" style="padding:14px 0;font-size:18px;font-weight:800;color:#1d9bf0;">{{session_followed}}</td>
                </tr>
                <tr>
                  <td style="padding:14px 0;font-size:15px;color:#e7e9ea;border-top:1px solid #2f3336;">Users unfollowed</td>
                  <td align="right" style="padding:14px 0;font-size:18px;font-weight:800;color:#f4212e;border-top:1px solid #2f3336;">{{session_unfollowed}}</td>
                </tr>
              </table>

              <div style="font-size:11px;font-weight:700;letter-spacing:0.08em;color:#71767b;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid #2f3336;">All time</div>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0;">
                <tr>
                  <td style="padding:14px 0;font-size:15px;color:#e7e9ea;">Total followed</td>
                  <td align="right" style="padding:14px 0;font-size:18px;font-weight:800;color:#e7e9ea;">{{total_followed}}</td>
                </tr>
                <tr>
                  <td style="padding:14px 0;font-size:15px;color:#e7e9ea;border-top:1px solid #2f3336;">Total unfollowed</td>
                  <td align="right" style="padding:14px 0;font-size:18px;font-weight:800;color:#e7e9ea;border-top:1px solid #2f3336;">{{total_unfollowed}}</td>
                </tr>
                <tr>
                  <td style="padding:14px 0;font-size:15px;color:#e7e9ea;border-top:1px solid #2f3336;">Cron runs in total</td>
                  <td align="right" style="padding:14px 0;font-size:18px;font-weight:800;color:#e7e9ea;border-top:1px solid #2f3336;">{{cron_runs}}</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:18px 28px 22px;font-size:12px;color:#71767b;border-top:1px solid #2f3336;">
              Sent by your TwitterBot &middot; automated message
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
